name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build Release
        run: swift build -c release

      - name: Determine Version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create App Bundle
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          APP_DIR="QuotaBar.app/Contents/MacOS"
          mkdir -p "$APP_DIR"
          mkdir -p "QuotaBar.app/Contents/Resources"

          cp .build/release/QuotaBar "$APP_DIR/"
          cp Assets/Brand/AppIcon.icns QuotaBar.app/Contents/Resources/AppIcon.icns

          cat > QuotaBar.app/Contents/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>QuotaBar</string>
            <key>CFBundleIdentifier</key>
            <string>com.quotabar.app</string>
            <key>CFBundleName</key>
            <string>QuotaBar</string>
            <key>CFBundleVersion</key>
            <string>${APP_VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${APP_VERSION}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Ad-hoc Codesign
        run: codesign --force --deep -s - QuotaBar.app

      - name: Create ZIP Archive
        run: |
          ditto -c -k --keepParent QuotaBar.app "QuotaBar-${{ github.ref_name }}-macOS.zip"
          cp "QuotaBar-${{ github.ref_name }}-macOS.zip" QuotaBar-macOS.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            QuotaBar-${{ github.ref_name }}-macOS.zip
            QuotaBar-macOS.zip
          generate_release_notes: true
          draft: false
          prerelease: false
